AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClawFleet - Dynamic AMI Lookup'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
  
  InstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 5
  
  InstanceNamePrefix:
    Type: String
    Default: 'openclaw'
  
  InstanceType:
    Type: String
    Default: 't4g.medium'
  
  BedrockModel:
    Type: String
    Default: 'global.anthropic.claude-sonnet-4-5-20250929-v1:0'
  
  # Dynamic AMI lookup via SSM Parameter
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64

Conditions:
  Deploy1: !Not [!Equals [!Ref InstanceCount, 0]]
  Deploy2: !Or [!Equals [!Ref InstanceCount, 2], !Equals [!Ref InstanceCount, 3], !Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5]]
  Deploy3: !Or [!Equals [!Ref InstanceCount, 3], !Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5]]
  Deploy4: !Or [!Equals [!Ref InstanceCount, 4], !Equals [!Ref InstanceCount, 5]]
  Deploy5: !Equals [!Ref InstanceCount, 5]

# Rest of template same as simple-ec2.yaml, but use !Ref LatestAmiId instead of !FindInMap
