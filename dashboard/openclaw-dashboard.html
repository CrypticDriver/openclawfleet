<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚢 OpenClaw Fleet Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .subtitle {
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 40px;
      font-size: 18px;
    }
    
    .instances {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .instance {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    
    .instance:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    
    .instance-header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .instance-icon {
      font-size: 40px;
      margin-right: 15px;
    }
    
    .instance-title {
      font-size: 24px;
      font-weight: 600;
      color: #333;
    }
    
    .instance-info {
      margin-bottom: 15px;
    }
    
    .info-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    
    .info-value {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #666;
      background: #f5f5f5;
      padding: 8px 12px;
      border-radius: 6px;
      word-break: break-all;
    }
    
    .open-button {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: opacity 0.2s;
    }
    
    .open-button:hover {
      opacity: 0.9;
    }
    
    .copy-button {
      margin-top: 10px;
      padding: 8px 15px;
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #666;
      transition: background 0.2s;
    }
    
    .copy-button:hover {
      background: #e0e0e0;
    }
    
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.8);
      margin-top: 40px;
      font-size: 14px;
    }
    
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }
    
    .status.online {
      background: #10b981;
      color: white;
    }
    
    .status.offline {
      background: #ef4444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚢 OpenClaw Fleet</h1>
    <p class="subtitle">Access your OpenClaw instances via SSM tunnels</p>
    
    <div class="instances" id="instances">
      <!-- Instances will be loaded here -->
    </div>
    
    <div class="footer">
      <p>Make sure all SSM tunnels are running before accessing</p>
      <p style="margin-top: 10px;">Run: <code>./openclaw-connect-all.sh</code></p>
    </div>
  </div>
  
  <script>
    // This will be populated by the script
    const instances = [
      {
        name: 'Instance 1',
        icon: '🦞',
        id: 'INSTANCE_1_ID',
        port: 18789,
        token: 'INSTANCE_1_TOKEN'
      },
      {
        name: 'Instance 2',
        icon: '🦀',
        id: 'INSTANCE_2_ID',
        port: 18790,
        token: 'INSTANCE_2_TOKEN'
      },
      {
        name: 'Instance 3',
        icon: '🦐',
        id: 'INSTANCE_3_ID',
        port: 18791,
        token: 'INSTANCE_3_TOKEN'
      }
    ];
    
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Token copied to clipboard!');
      });
    }
    
    function renderInstances() {
      const container = document.getElementById('instances');
      container.innerHTML = instances.map(inst => `
        <div class="instance">
          <div class="instance-header">
            <div class="instance-icon">${inst.icon}</div>
            <div class="instance-title">${inst.name}</div>
          </div>
          
          <div class="instance-info">
            <div class="info-label">Instance ID</div>
            <div class="info-value">${inst.id}</div>
          </div>
          
          <div class="instance-info">
            <div class="info-label">Local Port</div>
            <div class="info-value">localhost:${inst.port}</div>
          </div>
          
          <div class="instance-info">
            <div class="info-label">Auth Token</div>
            <div class="info-value">${inst.token.substring(0, 20)}...</div>
            <button class="copy-button" onclick="copyToClipboard('${inst.token}')">
              📋 Copy Full Token
            </button>
          </div>
          
          <a href="http://localhost:${inst.port}/" target="_blank" class="open-button">
            → Open ${inst.name}
          </a>
        </div>
      `).join('');
    }
    
    renderInstances();
  </script>
</body>
</html>
