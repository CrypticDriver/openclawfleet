AWSTemplateFormatVersion: '2010-09-09'
Description: 'OpenClaw Multi-Deployment - Dashboard (Management Console)'

Parameters:
  SharedStackName:
    Description: Name of the Shared Resources stack
    Type: String
    Default: 'openclaw-shared'

Resources:
  # =====================================================
  # S3 Bucket for Dashboard Static Website
  # =====================================================
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'openclaw-dashboard-${AWS::AccountId}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Project
          Value: OpenClaw-Multi
        - Key: Component
          Value: Dashboard

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${DashboardBucket.Arn}/*'

  # =====================================================
  # Lambda Function to serve dashboard and list instances
  # =====================================================
  DashboardFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-dashboard'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt DashboardFunctionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          REGION: !Ref AWS::Region
          SHARED_STACK_NAME: !Ref SharedStackName
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime

          cfn = boto3.client('cloudformation')
          asg = boto3.client('autoscaling')
          cw = boto3.client('cloudwatch')
          ssm = boto3.client('ssm')
          
          REGION = os.environ['REGION']
          SHARED_STACK = os.environ['SHARED_STACK_NAME']

          def lambda_handler(event, context):
              path = event.get('path', '/')
              
              # Serve dashboard HTML
              if path == '/' or path == '/dashboard':
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'text/html'},
                      'body': get_dashboard_html()
                  }
              
              # API: List instances
              elif path == '/api/instances':
                  instances = list_instances()
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps(instances)
                  }
              
              # API: Get instance token
              elif path.startswith('/api/token/'):
                  instance_name = path.split('/')[-1]
                  token = get_instance_token(instance_name)
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({'token': token})
                  }
              
              else:
                  return {
                      'statusCode': 404,
                      'body': 'Not Found'
                  }

          def list_instances():
              instances = []
              
              try:
                  # Get ALB URL
                  alb_url = get_alb_url()
                  
                  # List all OpenClaw stacks
                  stacks = cfn.list_stacks(
                      StackStatusFilter=['CREATE_COMPLETE', 'UPDATE_COMPLETE']
                  )
                  
                  for stack in stacks['StackSummaries']:
                      stack_name = stack['StackName']
                      
                      # Skip foundation and shared stacks
                      if stack_name in ['openclaw-foundation', 'openclaw-shared', SHARED_STACK]:
                          continue
                      
                      # Only include OpenClaw instance stacks
                      if not stack_name.startswith('openclaw-'):
                          continue
                      
                      # Get instance details
                      instance_name = stack_name.replace('openclaw-', '')
                      
                      # Get ASG details
                      try:
                          stack_outputs = cfn.describe_stacks(StackName=stack_name)['Stacks'][0]['Outputs']
                          asg_name = next((o['OutputValue'] for o in stack_outputs if o['OutputKey'] == 'AutoScalingGroupName'), None)
                          
                          if asg_name:
                              asg_info = asg.describe_auto_scaling_groups(
                                  AutoScalingGroupNames=[asg_name]
                              )['AutoScalingGroups'][0]
                              
                              instances_count = len(asg_info['Instances'])
                              healthy_count = len([i for i in asg_info['Instances'] if i['HealthStatus'] == 'Healthy'])
                              
                              # Determine status
                              if healthy_count == asg_info['DesiredCapacity'] and healthy_count > 0:
                                  status = 'healthy'
                              elif healthy_count > 0:
                                  status = 'degraded'
                              else:
                                  status = 'unhealthy'
                              
                              # Get CPU if instances exist
                              cpu = 'N/A'
                              if asg_info['Instances']:
                                  instance_id = asg_info['Instances'][0]['InstanceId']
                                  cpu_data = cw.get_metric_statistics(
                                      Namespace='AWS/EC2',
                                      MetricName='CPUUtilization',
                                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                                      StartTime=datetime.utcnow().replace(minute=0, second=0, microsecond=0),
                                      EndTime=datetime.utcnow(),
                                      Period=3600,
                                      Statistics=['Average']
                                  )
                                  if cpu_data['Datapoints']:
                                      cpu = f"{cpu_data['Datapoints'][0]['Average']:.1f}%"
                              
                              instances.append({
                                  'name': instance_name,
                                  'status': status,
                                  'instances': instances_count,
                                  'healthy': healthy_count,
                                  'desired': asg_info['DesiredCapacity'],
                                  'cpu': cpu,
                                  'url': f"{alb_url}/{instance_name}/",
                                  'stackName': stack_name
                              })
                      except Exception as e:
                          print(f"Error getting details for {instance_name}: {e}")
                          continue
              
              except Exception as e:
                  print(f"Error listing instances: {e}")
              
              return instances

          def get_alb_url():
              try:
                  outputs = cfn.describe_stacks(StackName=SHARED_STACK)['Stacks'][0]['Outputs']
                  return next((o['OutputValue'] for o in outputs if o['OutputKey'] == 'LoadBalancerURL'), '')
              except:
                  return ''

          def get_instance_token(instance_name):
              try:
                  response = ssm.get_parameter(
                      Name=f'/openclaw/{instance_name}/token',
                      WithDecryption=True
                  )
                  return response['Parameter']['Value']
              except:
                  return None

          def get_dashboard_html():
              return '''<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Multi-Deployment - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .stat-value { font-size: 2.5em; font-weight: bold; }
        .stat-label { font-size: 0.9em; opacity: 0.9; margin-top: 5px; }
        .instances-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .instance-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .instance-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .instance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .instance-name {
            font-size: 1.4em;
            font-weight: 600;
            color: #333;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .status-healthy { background: #d4edda; color: #155724; }
        .status-degraded { background: #fff3cd; color: #856404; }
        .status-unhealthy { background: #f8d7da; color: #721c24; }
        .instance-info { margin-bottom: 20px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label { color: #666; font-size: 0.9em; }
        .info-value { color: #333; font-weight: 500; }
        .instance-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐕 OpenClaw Multi-Deployment</h1>
            <p>统一管理面板</p>
        </div>
        
        <div class="stats-bar" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-instances">-</div>
                <div class="stat-label">总实例数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="healthy-instances">-</div>
                <div class="stat-label">健康实例</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-capacity">-</div>
                <div class="stat-label">总容量</div>
            </div>
        </div>
        
        <div id="loading" class="loading">加载中...</div>
        <div id="instances" class="instances-grid" style="display: none;"></div>
    </div>

    <script>
        async function loadInstances() {
            try {
                const response = await fetch('/api/instances');
                const instances = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('instances').style.display = 'grid';
                
                // Update stats
                const total = instances.length;
                const healthy = instances.filter(i => i.status === 'healthy').length;
                const capacity = instances.reduce((sum, i) => sum + i.instances, 0);
                
                document.getElementById('total-instances').textContent = total;
                document.getElementById('healthy-instances').textContent = healthy;
                document.getElementById('total-capacity').textContent = capacity;
                
                // Render instances
                const container = document.getElementById('instances');
                container.innerHTML = instances.map(instance => `
                    <div class="instance-card">
                        <div class="instance-header">
                            <div class="instance-name">${instance.name}</div>
                            <div class="status-badge status-${instance.status}">
                                ${getStatusText(instance.status)}
                            </div>
                        </div>
                        <div class="instance-info">
                            <div class="info-row">
                                <span class="info-label">实例数</span>
                                <span class="info-value">${instance.healthy}/${instance.desired}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">CPU 使用</span>
                                <span class="info-value">${instance.cpu}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Stack</span>
                                <span class="info-value">${instance.stackName}</span>
                            </div>
                        </div>
                        <div class="instance-actions">
                            <button class="btn btn-primary" onclick="openInstance('${instance.name}', '${instance.url}')">
                                打开 Web UI
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading instances:', error);
                document.getElementById('loading').textContent = '加载失败: ' + error.message;
            }
        }
        
        function getStatusText(status) {
            return {
                'healthy': '健康',
                'degraded': '降级',
                'unhealthy': '不健康'
            }[status] || status;
        }
        
        async function openInstance(name, baseUrl) {
            try {
                const response = await fetch(`/api/token/${name}`);
                const data = await response.json();
                if (data.token) {
                    window.open(`${baseUrl}?token=${data.token}`, '_blank');
                } else {
                    alert('无法获取访问 token');
                }
            } catch (error) {
                alert('错误: ' + error.message);
            }
        }
        
        // Auto refresh every 30 seconds
        loadInstances();
        setInterval(loadInstances, 30000);
    </script>
</body>
</html>'''.strip()

      Tags:
        - Key: Project
          Value: OpenClaw-Multi
        - Key: Component
          Value: Dashboard

  DashboardFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: DashboardAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:ListStacks'
                  - 'cloudformation:DescribeStacks'
                  - 'autoscaling:DescribeAutoScalingGroups'
                  - 'cloudwatch:GetMetricStatistics'
                  - 'ssm:GetParameter'
                Resource: '*'

  # =====================================================
  # API Gateway to expose Lambda
  # =====================================================
  DashboardApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      ProtocolType: HTTP

  DashboardIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref DashboardApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt DashboardFunction.Arn
      PayloadFormatVersion: '2.0'

  DashboardRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DashboardApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${DashboardIntegration}'

  DashboardStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref DashboardApi
      StageName: '$default'
      AutoDeploy: true

  DashboardFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DashboardApi}/*'

Outputs:
  DashboardURL:
    Description: Dashboard access URL
    Value: !GetAtt DashboardApi.ApiEndpoint

  DashboardBucketName:
    Description: S3 bucket for dashboard static files
    Value: !Ref DashboardBucket

  DashboardFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt DashboardFunction.Arn
