            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .instance-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .instance-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .instance-name {
            font-size: 1.4em;
            font-weight: 600;
            color: #333;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .status-healthy { background: #d4edda; color: #155724; }
        .status-degraded { background: #fff3cd; color: #856404; }
        .status-unhealthy { background: #f8d7da; color: #721c24; }
        .instance-info { margin-bottom: 20px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label { color: #666; font-size: 0.9em; }
        .info-value { color: #333; font-weight: 500; }
        .instance-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐕 OpenClawFleet</h1>
            <p>统一管理面板</p>
        </div>
        
        <div class="stats-bar" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-instances">-</div>
                <div class="stat-label">总实例数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="healthy-instances">-</div>
                <div class="stat-label">健康实例</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-capacity">-</div>
                <div class="stat-label">总容量</div>
            </div>
        </div>
        
        <div id="loading" class="loading">加载中...</div>
        <div id="instances" class="instances-grid" style="display: none;"></div>
    </div>

    <script>
        async function loadInstances() {
            try {
                const response = await fetch('/api/instances');
                const instances = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('instances').style.display = 'grid';
                
                // Update stats
                const total = instances.length;
                const healthy = instances.filter(i => i.status === 'healthy').length;
                const capacity = instances.reduce((sum, i) => sum + i.instances, 0);
                
                document.getElementById('total-instances').textContent = total;
                document.getElementById('healthy-instances').textContent = healthy;
                document.getElementById('total-capacity').textContent = capacity;
                
                // Render instances
                const container = document.getElementById('instances');
                container.innerHTML = instances.map(instance => `
                    <div class="instance-card">
                        <div class="instance-header">
                            <div class="instance-name">${instance.name}</div>
                            <div class="status-badge status-${instance.status}">
                                ${getStatusText(instance.status)}
                            </div>
                        </div>
                        <div class="instance-info">
                            <div class="info-row">
                                <span class="info-label">实例数</span>
                                <span class="info-value">${instance.healthy}/${instance.desired}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">CPU 使用</span>
                                <span class="info-value">${instance.cpu}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Stack</span>
                                <span class="info-value">${instance.stackName}</span>
                            </div>
                        </div>
                        <div class="instance-actions">
                            <button class="btn btn-primary" onclick="openInstance('${instance.name}', '${instance.url}')">
                                打开 Web UI
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading instances:', error);
                document.getElementById('loading').textContent = '加载失败: ' + error.message;
            }
        }
        
        function getStatusText(status) {
            return {
                'healthy': '健康',
                'degraded': '降级',
                'unhealthy': '不健康'
            }[status] || status;
        }
        
        async function openInstance(name, baseUrl) {
            try {
                const response = await fetch(`/api/token/${name}`);
                const data = await response.json();
                if (data.token) {
                    window.open(`${baseUrl}?token=${data.token}`, '_blank');
                } else {
                    alert('无法获取访问 token');
                }
            } catch (error) {
                alert('错误: ' + error.message);
            }
        }
        
        // Auto refresh every 30 seconds
        loadInstances();
        setInterval(loadInstances, 30000);
    </script>
</body>
</html>'''.strip()

      Tags:
        - Key: Project
          Value: OpenClaw-Multi
        - Key: Component
          Value: Dashboard

  DashboardFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: DashboardAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'cloudformation:ListStacks'
                  - 'cloudformation:DescribeStacks'
                  - 'autoscaling:DescribeAutoScalingGroups'
                  - 'cloudwatch:GetMetricStatistics'
                  - 'ssm:GetParameter'
                Resource: '*'

  # =====================================================
  # API Gateway to expose Lambda
  # =====================================================
  DashboardApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      ProtocolType: HTTP

  DashboardIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref DashboardApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt DashboardFunction.Arn
      PayloadFormatVersion: '2.0'

  DashboardRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref DashboardApi
      RouteKey: '$default'
      Target: !Sub 'integrations/${DashboardIntegration}'

  DashboardStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref DashboardApi
      StageName: '$default'
      AutoDeploy: true

  DashboardFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DashboardFunction
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${DashboardApi}/*'

Outputs:
  DashboardURL:
    Description: Dashboard access URL
    Value: !GetAtt DashboardApi.ApiEndpoint

  DashboardBucketName:
    Description: S3 bucket for dashboard static files
    Value: !Ref DashboardBucket

  DashboardFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt DashboardFunction.Arn
