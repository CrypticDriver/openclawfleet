          ssm = boto3.client('ssm')
          
          REGION = os.environ['REGION']
          SHARED_STACK = os.environ['SHARED_STACK_NAME']

          def lambda_handler(event, context):
              path = event.get('path', '/')
              
              # Serve dashboard HTML
              if path == '/' or path == '/dashboard':
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'text/html'},
                      'body': get_dashboard_html()
                  }
              
              # API: List instances
              elif path == '/api/instances':
                  instances = list_instances()
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps(instances)
                  }
              
              # API: Get instance token
              elif path.startswith('/api/token/'):
                  instance_name = path.split('/')[-1]
                  token = get_instance_token(instance_name)
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({'token': token})
                  }
              
              else:
                  return {
                      'statusCode': 404,
                      'body': 'Not Found'
                  }

          def list_instances():
              instances = []
              
              try:
                  # Get ALB URL
                  alb_url = get_alb_url()
                  
                  # List all OpenClaw stacks
                  stacks = cfn.list_stacks(
                      StackStatusFilter=['CREATE_COMPLETE', 'UPDATE_COMPLETE']
                  )
                  
                  for stack in stacks['StackSummaries']:
                      stack_name = stack['StackName']
                      
                      # Skip foundation and shared stacks
                      if stack_name in ['openclaw-foundation', 'openclaw-shared', SHARED_STACK]:
                          continue
                      
                      # Only include OpenClaw instance stacks
                      if not stack_name.startswith('openclaw-'):
                          continue
                      
                      # Get instance details
                      instance_name = stack_name.replace('openclaw-', '')
                      
                      # Get ASG details
                      try:
                          stack_outputs = cfn.describe_stacks(StackName=stack_name)['Stacks'][0]['Outputs']
                          asg_name = next((o['OutputValue'] for o in stack_outputs if o['OutputKey'] == 'AutoScalingGroupName'), None)
                          
                          if asg_name:
                              asg_info = asg.describe_auto_scaling_groups(
                                  AutoScalingGroupNames=[asg_name]
                              )['AutoScalingGroups'][0]
                              
                              instances_count = len(asg_info['Instances'])
                              healthy_count = len([i for i in asg_info['Instances'] if i['HealthStatus'] == 'Healthy'])
                              
                              # Determine status
                              if healthy_count == asg_info['DesiredCapacity'] and healthy_count > 0:
                                  status = 'healthy'
                              elif healthy_count > 0:
                                  status = 'degraded'
                              else:
                                  status = 'unhealthy'
                              
                              # Get CPU if instances exist
                              cpu = 'N/A'
                              if asg_info['Instances']:
                                  instance_id = asg_info['Instances'][0]['InstanceId']
                                  cpu_data = cw.get_metric_statistics(
                                      Namespace='AWS/EC2',
                                      MetricName='CPUUtilization',
                                      Dimensions=[{'Name': 'InstanceId', 'Value': instance_id}],
                                      StartTime=datetime.utcnow().replace(minute=0, second=0, microsecond=0),
                                      EndTime=datetime.utcnow(),
                                      Period=3600,
                                      Statistics=['Average']
                                  )
                                  if cpu_data['Datapoints']:
                                      cpu = f"{cpu_data['Datapoints'][0]['Average']:.1f}%"
                              
                              instances.append({
                                  'name': instance_name,
                                  'status': status,
                                  'instances': instances_count,
                                  'healthy': healthy_count,
                                  'desired': asg_info['DesiredCapacity'],
                                  'cpu': cpu,
                                  'url': f"{alb_url}/{instance_name}/",
                                  'stackName': stack_name
                              })
                      except Exception as e:
                          print(f"Error getting details for {instance_name}: {e}")
                          continue
              
              except Exception as e:
                  print(f"Error listing instances: {e}")
              
              return instances

          def get_alb_url():
              try:
                  outputs = cfn.describe_stacks(StackName=SHARED_STACK)['Stacks'][0]['Outputs']
                  return next((o['OutputValue'] for o in outputs if o['OutputKey'] == 'LoadBalancerURL'), '')
              except:
                  return ''

          def get_instance_token(instance_name):
              try:
                  response = ssm.get_parameter(
                      Name=f'/openclaw/{instance_name}/token',
                      WithDecryption=True
                  )
                  return response['Parameter']['Value']
              except:
                  return None

